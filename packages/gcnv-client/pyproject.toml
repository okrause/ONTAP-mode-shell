[project]
name = "gcnv-client"
version = "0.1.0"
description = "Google Cloud NetApp Volumes API client for ONTAP-mode storage pools"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "google-auth>=2.48.0",
    "requests>=2.32.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gcnv_client"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
