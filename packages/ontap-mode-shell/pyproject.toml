[project]
name = "ontap-mode-shell"
version = "0.1.0"
description = "Interactive ONTAP-mode shell for Google Cloud NetApp Volumes"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "gcnv-client",
    "ontap-completer",
    "gnureadline>=8.2.0; sys_platform == 'darwin'",
]

[project.scripts]
ontap-mode-shell = "ontap_mode_shell.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["ontap_mode_shell"]
